<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Escape | Page 8</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
      body { 
        background-color: #1a0a0a; 
        color: white; 
        font-family: 'Georgia', serif; 
        padding-top: 80px; 
        text-align: center; 
      }
      .story-box {
        background: #2b1111;
        padding: 40px;
        border-radius: 15px;
        border: 1px solid #4a1a1a;
      }
      /* Hover effect for the 'Back' button */
      .btn-outline-secondary:hover { 
        transform: scale(1.1); 
        transition: 0.3s; 
        background-color: #6c757d;
        color: white;
      }
    </style>
  </head>
  <body>

    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 story-box">
          <h2 class="mb-4">The Endless Shelves</h2>
          
          <img src="images/library-deep.jpg" class="img-fluid mb-4 rounded" alt="Endless rows of dark bookshelves">
          
          <p class="lead mb-5">
            You wander deeper into the library. The shadows grow longer and the air grows colder. 
            You realize these shelves go on forever. There is no exit here, and the dust is 
            making it hard to breathe. You should go back before you lose your way entirely.
          </p>

          <div class="d-grid gap-3 d-md-flex justify-content-md-center">
            <a href="05.html" class="btn btn-outline-secondary btn-lg">Return to Library Entrance</a>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
