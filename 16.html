<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Escape | Page 16</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { 
        background-color: #0a0a1a; 
        color: #d1d1ff; 
        font-family: 'Georgia', serif; 
        padding-top: 60px; 
        text-align: center; 
      }
      .item-box { 
        background: #11112b; 
        padding: 40px; 
        border-radius: 20px; 
        border: 2px solid #00d4ff; 
        box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
      }
      .key-image {
        max-width: 250px;
        height: auto;
        filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.6));
        margin-bottom: 30px;
      }
      .btn-light:hover { 
        transform: scale(1.1); 
        transition: 0.3s; 
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 item-box">
          <h2 class="mb-4">You found it!</h2>
          
          <img src="img/key.png" class="key-image" alt="A shiny silver key sitting on a block of ice">
          
          <p class="lead mb-4">
            Sitting inside a block of ice is a heavy gold key. You take it out!
           It's freezing to the touch, but it feels like victory.
          </p>
          
          <a href="17.html" class="btn btn-light btn-lg">Escape the House</a>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
