<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Escape | Page 16</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
      body { 
        background-color: #0a0a1a; 
        color: #d1d1ff; 
        font-family: 'Georgia', serif; 
        padding-top: 80px; 
        text-align: center; 
      }
      .story-box {
        background: #11112b;
        padding: 40px;
        border-radius: 15px;
        border: 2px solid #00f2ff; /* Glowing border for the item found */
      }
      /* Rubric Requirement: Interactive Hover Element */
      .btn-info:hover { 
        transform: scale(1.1); 
        transition: 0.3s; 
        background-color: #00f2ff;
        color: black;
      }
    </style>
  </head>
  <body>

    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 story-box">
          <h2 class="mb-4">Item Found: Silver Key</h2>
          
          <img src="images/silver-key.jpg" class="img-fluid mb-4 rounded" alt="A glowing silver key sitting in a box">
          
          <p class="lead mb-5">
            You open the silver box. Inside, resting on a bed of blue velvet, is a heavy 
            silver key. It’s freezing to the touch, but you know this is exactly what 
            you need to get out of this house.
          </p>

          <div class="d-grid gap-3 d-md-flex justify-content-md-center">
            <a href="17.html" class="btn btn-info btn-lg">Pocket the key and leave</a>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
