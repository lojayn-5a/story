<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Escape | Page 2</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
      body { 
        background-color: #121212; 
        color: white; 
        font-family: 'Georgia', serif; 
        padding-top: 100px; 
        text-align: center; 
      }
      .story-box {
        background: #1a1a1a;
        padding: 40px;
        border-radius: 15px;
        border: 1px solid #333;
      }
      /* Rubric Requirement: Interactive Hover Element */
      .btn-outline-light:hover { 
        transform: scale(1.1); 
        transition: 0.3s; 
        background-color: white;
        color: black;
      }
    </style>
  </head>
  <body>

    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 story-box">
          <h2 class="mb-4">The First Clue</h2>
          
          <img src="images/flashlight.jpg" class="img-fluid mb-4 rounded" alt="A small metal object on the floor">
          
          <p class="lead mb-5">
            Your hand brushes against something cold and metallic on the floor. 
            It feels like a flashlight. You fumble with the switch, hoping for a spark of light.
          </p>

          <a href="03.html" class="btn btn-outline-light btn-lg">Click the switch</a>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
