<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Escape | THE END</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { 
        background-color: #000; 
        color: white; 
        font-family: 'Georgia', serif; 
        height: 100vh; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        text-align: center; 
      }
      .end-box { 
        border: 2px solid #2fff00; 
        padding: 60px; 
        border-radius: 20px; 
        background: #050505; 
        box-shadow: 0 0 30px #2fff00;
      }
      .btn-restart:hover { 
        transform: scale(1.1); 
        transition: 0.3s; 
        background-color: white;
        color: black;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="end-box">
        <h1 class="display-1 mb-3">CONGRATULATIONS</h1>
        <p class="lead mb-5 text-info">You found the Gold Key and you can finally escape the darkness of this house!</p>
        
        <a href="index.html" class="btn btn-outline-light btn-lg btn-restart">PLAY AGAIN</a>
        
        <div class="mt-5 text-align">
          <p>Thank you for playing!</p>
          <small>Project by Lojayn</small>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
