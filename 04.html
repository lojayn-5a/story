<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Escape | Page 4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { 
        background-color: #121212; 
        color: white; 
        font-family: 'Georgia', serif; 
        padding-top: 60px; 
        text-align: center; 
      }
      .door-card { 
        background: #1a1a1a; 
        padding: 20px; 
        border-radius: 15px; 
        border: 1px solid #333; 
        transition: 0.3s;
        height: 100%;
      }
      /* Hover effects for the doors */
      .door-card:hover {
        border-color: #555;
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
      }
      .btn-danger:hover { transform: scale(1.05); }
      .btn-primary:hover { transform: scale(1.05); }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="display-4 mb-5">A Choice to Make</h1>
      <p class="lead mb-5">There are two doors. Which path will you take?</p>
      
      <div class="row justify-content-center">
        <div class="col-md-5 mb-4">
          <div class="door-card">
            <img src="img/reddoor.png" class="img-fluid rounded mb-3" alt="An ancient red wooden door">
            <a href="05.html" class="btn btn-danger btn-lg w-100">Enter Red Door</a>
          </div>
        </div>

        <div class="col-md-5 mb-4">
          <div class="door-card">
            <img src="img/bluedoor.png" class="img-fluid rounded mb-3" alt="A heavy blue metal door">
            <a href="12.html" class="btn btn-primary btn-lg w-100">Enter Blue Door</a>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
