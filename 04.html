<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Escape | Page 4</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
      body { 
        background-color: #121212; 
        color: white; 
        font-family: 'Georgia', serif; 
        padding-top: 50px; 
        text-align: center; 
      }
      .door-choice {
        background: #1a1a1a;
        padding: 20px;
        border-radius: 15px;
        border: 1px solid #333;
        height: 100%; /* Ensures both boxes are same height */
      }
      /* Hover effects for the doors */
      .btn-danger:hover { background-color: #ff4d4d; transform: scale(1.05); transition: 0.3s; }
      .btn-primary:hover { background-color: #3399ff; transform: scale(1.05); transition: 0.3s; }
      
      img { border-radius: 10px; margin-bottom: 15px; }
    </style>
  </head>
  <body>

    <div class="container">
      <h1 class="display-4 mb-5">CHOOSE YOUR PATH</h1>
      
      <div class="row">
        <div class="col-md-6 mb-4">
          <div class="door-choice">
            <img src="images/red-door.jpg" class="img-fluid" alt="A heavy red door">
            <h3>The Red Door</h3>
            <p>A faint smell of old paper and dust drifts from behind this heavy oak door.</p>
            <a href="05.html" class="btn btn-danger btn-lg w-100">Enter the Library</a>
          </div>
        </div>

        <div class="col-md-6 mb-4">
          <div class="door-choice">
            <img src="images/blue-door.jpg" class="img-fluid" alt="A sleek blue door">
            <h3>The Blue Door</h3>
            <p>You hear the distant hum of a machine and a cool breeze from this metal door.</p>
            <a href="12.html" class="btn btn-primary btn-lg w-100">Enter the Kitchen</a>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
