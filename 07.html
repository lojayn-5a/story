<html lang="en">
  <head>
    <meta charset="utf-8">

    <title>The Escape | Page 7</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
      body { 
        background-color: #1a0a0a; 
        color: white; 
        font-family: 'Georgia', serif;

    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 story-box">
          <h2 class="mb-4">The Secret Under the Rug</h2>
          
          <img src="images/rug.jpg" class="img-fluid mb-4 rounded" alt="A dusty old rug being pulled back">
          
          <p class="lead mb-5">
            You peel back the corner of the heavy, moth-eaten rug. Instead of dust, you find a loose floorboard! 
            Tucked inside is a small, crumpled note that reads: <br>
            <strong class="text-warning">"The silver key is chilled among the forgotten food."</strong>
          </p>

          <div class="d-grid gap-3 d-md-flex justify-content-md-center">
