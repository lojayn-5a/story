<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Escape | Page 6</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
      body { 
        background-color: #1a0a0a; 
        color: white; 
        font-family: 'Georgia', serif; 
        padding-top: 80px; 
        text-align: center; 
      }
      .story-box {
        background: #2b1111;
        padding: 40px;
        border-radius: 15px;
        border: 1px solid #4a1a1a;
      }
      /* Rubric Requirement: Interactive Hover Element */
      .btn-outline-warning:hover { 
        transform: scale(1.1); 
        transition: 0.3s; 
        background-color: #ffc107;
        color: black;
      }
    </style>
  </head>
  <body>

    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 story-box">
          <h2 class="mb-4">Lost in the Pages</h2>
          
          <img src="images/bookshelves.jpg" class="img-fluid mb-4 rounded" alt="Endless rows of dusty books">
          
          <p class="lead mb-5">
            You pull book after book from the shelves, hoping for a hidden lever or a secret note. 
            Hours pass, and all you've found is dust and a few spiders. This path is a total waste of time.
          </p>

          <div class="d-grid gap-3 d-md-flex justify-content-md-center">
            <a href="05.html" class="btn btn-outline-warning btn-lg">Go back and look around the room again</a>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
