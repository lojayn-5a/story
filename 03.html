<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Escape | Page 3</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
      body { 
        background-color: #121212; 
        color: white; 
        font-family: 'Georgia', serif; 
        padding-top: 100px; 
        text-align: center; 
      }
      .story-box {
        background: #1a1a1a;
        padding: 40px;
        border-radius: 15px;
        border: 1px solid #333;
      }
      /* Rubric Requirement: Interactive Hover Element */
      .btn-outline-light:hover { 
        transform: scale(1.1); 
        transition: 0.3s; 
        background-color: white;
        color: black;
      }
    </style>
  </head>
  <body>

    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 story-box">
          <h2 class="mb-4">Fiat Lux</h2>
          
          <img src="images/light-on.jpg" class="img-fluid mb-4 rounded" alt="Flashlight beam hitting a stone wall">
          
          <p class="lead mb-5">
            The flashlight flickers, then steady beam of light cuts through the darkness. 
            Dust motes dance in the air. As you sweep the light across the room, you see that 
            this isn't just a cellar—it's a hallway with two very distinct exits.
          </p>

          <a href="04.html" class="btn btn-outline-light btn-lg">See where the hall leads</a>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
