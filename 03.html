<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Escape | Page 3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { 
        /* Changed background to a dark grey/yellow tint to simulate a flashlight beam */
        background-color: #2a2a1a; 
        color: #ffffcc; 
        font-family: 'Georgia', serif; 
        padding-top: 100px; 
        text-align: center; 
        transition: background-color 1s; /* Smooth light-on effect */
      }
      .story-box { 
        background: #333322; 
        padding: 40px; 
        border-radius: 15px; 
        border: 2px solid #ffff00; /* Yellow "glow" border */
        box-shadow: 0 0 30px rgba(255, 255, 0, 0.2);
      }
      .btn-warning:hover { 
        transform: scale(1.1); 
        transition: 0.3s; 
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 story-box">
          <h2 class="mb-4">Click!</h2>
          <p class="lead mb-5">
            The switch clicks under your thumb. For a second, nothing happens. Then, a 
            beam of yellow light cuts through the dust! You realize you are in 
            a hallway with two doors...
          </p>
          <a href="04.html" class="btn btn-warning btn-lg">Walk toward the doors</a>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
