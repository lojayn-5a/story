<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Escape | Page 1</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
      body { 
        background-color: #121212; 
        color: white; 
        font-family: 'Georgia', serif; 
        padding-top: 100px; 
        text-align: center; 
      }
      .story-box {
        background: #1a1a1a;
        padding: 40px;
        border-radius: 15px;
        border: 1px solid #333;
      }
      /* Rubric Requirement: Interactive Hover Element */
      .btn-outline-light:hover { 
        transform: scale(1.1); 
        transition: 0.3s; 
        background-color: white;
        color: black;
      }
    </style>
  </head>
  <body>

    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 story-box">
          <h1 class="display-3 mb-4">THE AWAKENING</h1>
          
          <img src="images/dark-room.jpg" class="img-fluid mb-4 rounded" alt="A dark, mysterious room">
          
          <p class="lead mb-5">
            The air is cold and smells of damp stone. You open your eyes, but everything is pitch black. 
            You don't know who you are or how you got here.
          </p>

          <a href="02.html" class="btn btn-outline-light btn-lg">Reach out into the darkness</a>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
